<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrar.Julian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', monospace;
            color: white;
            overflow-x: hidden;
            cursor: none;
        }
        
        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #4CAF50, #2E7D32);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }
        
        .custom-cursor.hover {
            transform: scale(2);
        }
        
        /* Background Video */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .video-bg iframe {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        
        /* Profile Section */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .profile-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #4CAF50;
            box-shadow: 0 0 50px rgba(76, 175, 80, 0.8);
            margin-bottom: 20px;
            object-fit: cover;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .name {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #4CAF50, #FFFF00, #FF5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
            margin-bottom: 40px;
            letter-spacing: 5px;
        }
        
        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px #4CAF50);
            }
            to {
                filter: drop-shadow(0 0 30px #FFFF00);
            }
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 25px;
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: none;
        }
        
        .btn:hover {
            background: #4CAF50;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.6);
        }
        
        .btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }
        
        /* Music Player */
        .music-section {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        
        .music-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.9);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .music-btn:hover {
            background: #4CAF50;
            transform: scale(1.1);
        }
        
        /* Content */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
            line-height: 1.8;
        }
        
        .section {
            margin-bottom: 60px;
        }
        
        .section h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #4CAF50;
            text-align: center;
        }
        
        .section p {
            font-size: 1.2rem;
            text-align: justify;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .name {
                font-size: 2.5rem;
            }
            
            .profile-img {
                width: 200px;
                height: 200px;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 250px;
                justify-content: center;
            }
        }
    </style>
</head>
